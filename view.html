<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>67UNC Result Viewer</title>
  <style>
    :root {
      --bg: #0e0e18;
      --panel: #17172a;
      --panel2: #20203a;
      --border: #2e2e50;
      --text: #ededf7;
      --muted: #a0a0c0;
      --good: #44c638;
      --bad: #e64343;
      --skip: #ea8725;
      --accent: #b7a0f6;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --font: Inter, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #212142 0%, var(--bg) 52%);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }
    .wrap {
      width: min(1100px, calc(100% - 24px));
      margin: 24px auto 48px;
    }
    .card {
      background: rgba(23,23,42,.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    h1, h2, p { margin: 0; }
    .hero { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
    .hero h1 { font-size: 1.7rem; }
    .hero p { color: var(--muted); margin-top: 6px; }
    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(183,160,246,.14);
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .score {
      display: grid;
      place-items: center;
      padding: 24px;
      min-height: 240px;
    }
    .score .ring {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 10px solid var(--border);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }
    .score .ring::before {
      content: "";
      position: absolute;
      inset: 0;
      background: conic-gradient(var(--accent) calc(var(--pct, 0) * 1%), transparent 0);
      mask: radial-gradient(circle at center, transparent 58px, black 59px);
      -webkit-mask: radial-gradient(circle at center, transparent 58px, black 59px);
    }
    .score .inner { position: relative; text-align: center; z-index: 1; }
    .score .pct { font-size: 2.2rem; font-weight: 800; }
    .score .sub { color: var(--muted); font-size: .9rem; margin-top: 4px; }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .meta {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .meta .label { color: var(--muted); font-size: .82rem; margin-bottom: 6px; }
    .meta .value { font-family: var(--mono); font-weight: 700; word-break: break-word; }
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }
    button.active { border-color: var(--accent); color: var(--accent); }
    .tests {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .test {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .test .name { font-family: var(--mono); font-size: .9rem; margin-bottom: 6px; }
    .test .reason { color: var(--muted); font-size: .82rem; line-height: 1.45; }
    .pass { color: var(--good); }
    .fail { color: var(--bad); }
    .skip { color: var(--skip); }
    .state {
      min-height: 60vh;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
    .error { color: #ff9c9c; }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loading" class="state">Loading result…</div>
    <div id="error" class="state error" style="display:none"></div>
    <div id="app" style="display:none">
      <div class="card hero">
        <div>
          <h1>67UNC Result Viewer</h1>
          <p id="subtitle">Result details</p>
        </div>
        <div class="badge" id="resultId">ID: —</div>
      </div>

      <div class="grid">
        <div class="card score">
          <div class="ring" id="ring">
            <div class="inner">
              <div class="pct" id="pct">0%</div>
              <div class="sub">score</div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="meta-grid">
            <div class="meta"><div class="label">Executor</div><div class="value" id="executor">—</div></div>
            <div class="meta"><div class="label">Elapsed</div><div class="value" id="elapsed">—</div></div>
            <div class="meta"><div class="label">Version</div><div class="value" id="version">—</div></div>
            <div class="meta"><div class="label">Author</div><div class="value" id="author">—</div></div>
            <div class="meta"><div class="label">Passed</div><div class="value pass" id="passed">—</div></div>
            <div class="meta"><div class="label">Failed</div><div class="value fail" id="failed">—</div></div>
            <div class="meta"><div class="label">Skipped</div><div class="value skip" id="skipped">—</div></div>
            <div class="meta"><div class="label">Tested / Target</div><div class="value" id="tested">—</div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="filters">
          <button class="active" data-filter="all">All</button>
          <button data-filter="pass">Pass</button>
          <button data-filter="fail">Fail</button>
          <button data-filter="skip">Skip</button>
        </div>
        <div class="tests" id="tests"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const id = (params.get('id') || '').toLowerCase();

    if (!/^[a-f0-9]{16}$/.test(id)) {
      $('loading').style.display = 'none';
      $('error').style.display = '';
      $('error').textContent = 'Missing or invalid result id in the URL.';
    } else {
      fetch('/api/result-view?id=' + encodeURIComponent(id))
        .then(async (r) => {
          const body = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(body.error || 'Failed to load result');
          return body;
        })
        .then(render)
        .catch((err) => {
          $('loading').style.display = 'none';
          $('error').style.display = '';
          $('error').textContent = err.message || 'Failed to load result';
        });
    }

    function render(data) {
      $('loading').style.display = 'none';
      $('app').style.display = '';
      $('resultId').textContent = 'ID: ' + id;
      $('subtitle').textContent = 'Stored for 7 days in Vercel KV';

      const summary = data.summary || {};
      const score = Number(summary.score || 0);
      $('pct').textContent = score + '%';
      $('ring').style.setProperty('--pct', score);
      $('executor').textContent = data.executor || 'Unknown';
      $('elapsed').textContent = data.elapsed || '—';
      $('version').textContent = data.version || '—';
      $('author').textContent = data.author || '—';
      $('passed').textContent = summary.passed ?? '—';
      $('failed').textContent = summary.failed ?? '—';
      $('skipped').textContent = summary.skipped ?? '—';
      $('tested').textContent = (summary.tested ?? '—') + ' / ' + (summary.target ?? '—');

      const testsEl = $('tests');
      const tests = Array.isArray(data.tests) ? data.tests : [];
      testsEl.innerHTML = '';
      for (const test of tests) {
        const status = test.status || 'skip';
        const card = document.createElement('div');
        card.className = 'test';
        card.dataset.status = status;
        const cls = status === 'pass' ? 'pass' : status === 'fail' ? 'fail' : 'skip';
        card.innerHTML = `
          <div class="name ${cls}">${escapeHtml(test.name || 'Unnamed test')}</div>
          <div class="reason">${escapeHtml(test.reason || 'No reason provided')}</div>
        `;
        testsEl.appendChild(card);
      }

      for (const btn of document.querySelectorAll('button[data-filter]')) {
        btn.addEventListener('click', () => {
          for (const b of document.querySelectorAll('button[data-filter]')) b.classList.remove('active');
          btn.classList.add('active');
          const f = btn.dataset.filter;
          for (const card of document.querySelectorAll('.test')) {
            card.style.display = (f === 'all' || card.dataset.status === f) ? '' : 'none';
          }
        });
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
